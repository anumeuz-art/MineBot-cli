<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINE BOT | Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        @font-face {
            font-family: 'Minecraftia';
            src: url('https://db.onlinewebfonts.com/t/6ab52003135aedab3ad34584046d997d.eot');
            src: url('https://db.onlinewebfonts.com/t/6ab52003135aedab3ad34584046d997d.eot?#iefix') format('embedded-opentype'),
            url('https://db.onlinewebfonts.com/t/6ab52003135aedab3ad34584046d997d.woff2') format('woff2'),
            url('https://db.onlinewebfonts.com/t/6ab52003135aedab3ad34584046d997d.woff') format('woff'),
            url('https://db.onlinewebfonts.com/t/6ab52003135aedab3ad34584046d997d.ttf') format('truetype');
        }

        :root { 
            --bg: #0b0e14; 
            --card: rgba(20, 25, 35, 0.85); 
            --neon-g: #39ff14; 
            --neon-p: #bc13fe; 
            --mc-border: #4a5568; 
            --text-muted: #8b949e; 
        }
        body { 
            background: var(--bg); 
            color: #e2e8f0; 
            font-family: 'Minecraftia', sans-serif; 
            position: relative; 
            overflow-x: hidden; 
            background-image: radial-gradient(circle at 50% 50%, rgba(20, 30, 20, 0.5) 0%, #0b0e14 100%);
        }
        
        /* Bubble Effect Refinement */
        .bubbles { position: fixed; width: 100%; height: 100%; z-index: -1; top: 0; left: 0; overflow: hidden; pointer-events: none; }
        .bubble { 
            position: absolute; 
            bottom: -150px; 
            background: radial-gradient(circle at 30% 30%, rgba(57, 255, 20, 0.3), rgba(0, 0, 0, 0.1)); 
            border-radius: 4px; /* Pixel-ish rounded */
            filter: blur(15px);
            animation: rise 15s infinite ease-in; 
        }
        @keyframes rise { 
            0% { transform: translateY(0) scale(0.5); opacity: 0; } 
            20% { opacity: 0.6; } 
            100% { transform: translateY(-120vh) scale(1.2); opacity: 0; } 
        }

        h1, h2, h3, h4, h5, h6, .nav-link, .btn-mc, .stat-val { font-family: 'Minecraftia', sans-serif !important; letter-spacing: 0.5px; }

        .card { 
            background: var(--card); 
            backdrop-filter: blur(15px); 
            border: 4px solid var(--mc-border); 
            border-radius: 0; /* Sharp corners for MC aesthetic */
            transition: all 0.3s ease; 
            box-shadow: 10px 10px 0px rgba(0,0,0,0.3);
        }
        .card:hover { border-color: var(--neon-g); transform: translate(-2px, -2px); box-shadow: 15px 15px 0px rgba(57, 255, 20, 0.2); }
        
        .nav-tabs { border: none; }
        .nav-link { color: #8b949e; border: 4px solid transparent !important; margin-right: 10px; }
        .nav-link.active { border-color: var(--neon-g) !important; background: rgba(57, 255, 20, 0.1) !important; color: #fff !important; }
        
        .btn-mc { border-radius: 0; font-weight: bold; border: 3px solid transparent; }
        .btn-primary-mc { border-color: var(--neon-g); color: var(--neon-g); }
        .btn-primary-mc:hover { background: var(--neon-g); color: #000; }

    </style>
</head>
<body>
<div class="bubbles" id="bubbles"></div>
<script>
    const bubblesContainer = document.getElementById('bubbles');
    for(let i=0; i<15; i++) {
        const b = document.createElement('div');
        b.className = 'bubble';
        const size = Math.random() * 60 + 20 + 'px';
        b.style.width = size; b.style.height = size;
        b.style.left = Math.random() * 100 + '%';
        b.style.animationDelay = Math.random() * 10 + 's';
        bubblesContainer.appendChild(b);
    }
</script>

<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <div>
            <h1 class="fw-bold m-0" style="color: var(--neon-g); text-shadow: 0 0 15px var(--neon-g);">MINE BOT OS</h1>
            <div class="d-flex align-items-center mt-1">
                <small class="text-muted me-3">VERSION 2.8 • AI POWERED</small>
                <div class="btn-group btn-group-sm">
                    <button class="btn btn-outline-secondary btn-sm px-2 py-0" onclick="setUILang('uz')" style="font-size: 0.6rem;">UZ</button>
                    <button class="btn btn-outline-secondary btn-sm px-2 py-0" onclick="setUILang('ru')" style="font-size: 0.6rem;">RU</button>
                    <button class="btn btn-outline-secondary btn-sm px-2 py-0" onclick="setUILang('en')" style="font-size: 0.6rem;">EN</button>
                </div>
            </div>
        </div>
        <div>
            <button class="btn btn-danger-mc btn-mc px-4" onclick="clearMemory()"><i class="bi bi-cpu me-2"></i>WIPE MEMORY</button>
        </div>
    </div>

    <!-- TABS NAVIGATION -->
    <ul class="nav nav-tabs mb-4" id="adminTabs" role="tablist">
        <li class="nav-item"><button class="nav-link active" id="dash-tab" data-bs-toggle="tab" data-bs-target="#dashboard" type="button">{{ translations.tab_audience }}</button></li>
        <li class="nav-item"><button class="nav-link" id="queue-tab" data-bs-toggle="tab" data-bs-target="#queue" type="button">{{ translations.tab_queue }}</button></li>
        <li class="nav-item"><button class="nav-link" id="cf-tab" data-bs-toggle="tab" data-bs-target="#curseforge" type="button">CURSEFORGE</button></li>
        <li class="nav-item"><button class="nav-link" id="channels-tab" data-bs-toggle="tab" data-bs-target="#channels" type="button">{{ translations.tab_channels }}</button></li>
        <li class="nav-item"><button class="nav-link" id="themes-tab" data-bs-toggle="tab" data-bs-target="#prompts" type="button">AI THEMES</button></li>
        <li class="nav-item"><button class="nav-link" id="config-tab" data-bs-toggle="tab" data-bs-target="#settings" type="button">{{ translations.tab_settings }}</button></li>
    </ul>

    <div class="tab-content">
        {% block content %}{% endblock %}
    </div>
</div>

<script>
    function setUILang(lang) {
        fetch('/api/ui-lang', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ lang: lang })
        }).then(() => location.reload());
    }
</script>

{% include 'parts/modals.html' %}
{% include 'parts/scripts.html' %}

</body>
</html>

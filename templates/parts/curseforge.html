<div class="tab-pane fade" id="curseforge">
    <div class="card p-4">
        <h6 style="color: var(--neon-g);" class="mb-3">CURSEFORGE MOD EXPLORER</h6>
        <div class="input-group mb-4">
            <input type="text" id="cf-search-input" class="form-control" placeholder="Search mods (e.g. JEI, Sodium, Twilight Forest)...">
            <button class="btn btn-primary-mc btn-mc px-4" onclick="searchCF()">SEARCH</button>
        </div>

        <div id="cf-results" class="row">
            <!-- Results will be injected here -->
            <div class="col-12 text-center py-5 text-muted">
                <i class="bi bi-search" style="font-size: 2rem;"></i>
                <p class="mt-2">Enter a query to find Minecraft mods</p>
            </div>
        </div>
    </div>
</div>

<!-- Modal for scheduling CF post -->
<div class="modal fade" id="cfScheduleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h6 style="color: var(--neon-g);">SCHEDULE MOD POST</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <div id="cf-mod-preview" class="mb-3 p-3" style="background: rgba(255,255,255,0.05);">
                    <div class="d-flex align-items-center">
                        <img id="cf-preview-logo" src="" style="width: 50px; height: 50px; border-radius: 8px; margin-right: 15px; object-fit: cover;">
                        <div>
                            <b id="cf-preview-title" style="color: var(--neon-g);"></b><br>
                            <small id="cf-preview-version" class="text-muted"></small>
                        </div>
                    </div>
                </div>
                <label class="stats-label d-block mb-2">PUBLICATION TIME</label>
                <input type="datetime-local" id="cf-post-time" class="form-control mb-3">
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" id="cf-asap-check">
                    <label class="form-check-label text-muted" for="cf-asap-check" style="font-size: 0.7rem;">Publish ASAP (add to smart queue)</label>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-primary-mc btn-mc w-100" id="cf-confirm-btn">🚀 CREATE & QUEUE</button>
            </div>
        </div>
    </div>
</div>

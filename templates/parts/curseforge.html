<div class="tab-pane fade" id="curseforge">
    <div class="row">
        <div class="col-md-12">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h6 style="color: var(--neon-g);">CURSEFORGE MOD EXPLORER</h6>
                    <div class="input-group" style="width: 300px;">
                        <input type="text" id="cf-search-input" class="form-control" placeholder="Search mods...">
                        <button class="btn btn-primary-mc btn-mc" onclick="searchCF()">🔍</button>
                    </div>
                </div>
                <div class="row" id="cf-results">
                    <div class="col-12 text-center py-5 text-muted">
                        <i class="bi bi-search" style="font-size: 3rem;"></i>
                        <h5 class="mt-3">Search for a Minecraft mod to get started</h5>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- CurseForge Schedule Modal -->
<div class="modal fade" id="cfScheduleModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header border-secondary">
                <h6 style="color: var(--neon-g);">QUEUE MOD POST</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <img id="cf-preview-logo" style="width: 80px; height: 80px; object-fit: cover; border-radius: 12px; margin-bottom: 15px;">
                <h5 id="cf-preview-title" class="text-white"></h5>
                <p id="cf-preview-version" class="text-muted" style="font-size: 0.8rem;"></p>
                
                <div class="text-start mt-4">
                    <label class="stats-label mb-2">SCHEDULING OPTIONS</label>
                    <div class="form-check mb-2">
                        <input class="form-check-input" type="checkbox" id="cf-asap-check" checked onchange="document.getElementById('cf-post-time').disabled = this.checked">
                        <label class="form-check-label text-white" for="cf-asap-check">Post ASAP</label>
                    </div>
                    <input type="datetime-local" id="cf-post-time" class="form-control" disabled>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button class="btn btn-primary-mc btn-mc w-100" id="cf-confirm-btn">🚀 CREATE & QUEUE</button>
            </div>
        </div>
    </div>
</div>

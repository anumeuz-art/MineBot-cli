<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function improveWithAI() {
        const text = document.getElementById('new-prompt-text').value;
        if(!text) return alert('Write at least a few words about the theme!');
        const btn = event.target;
        const oldHtml = btn.innerHTML;
        btn.innerHTML = 'Thinking...';
        btn.disabled = true;
        
        fetch('/api/prompts/improve', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({desc: text})
        })
        .then(r => r.json())
        .then(data => {
            document.getElementById('new-prompt-text').value = data.improved;
            btn.innerHTML = oldHtml;
            btn.disabled = false;
        })
        .catch(err => {
            alert('AI Error: ' + err);
            btn.innerHTML = oldHtml;
            btn.disabled = false;
        });
    }

    function addChannel() {
        const name = document.getElementById('new-ch-name').value;
        if(!name) return;
        fetch('/api/channels', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({username: name})
        }).then(() => location.reload());
    }

    function removeChannel(name) {
        if(confirm('Remove ' + name + '?')) {
            fetch('/api/channels/delete', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({username: name})
            }).then(() => location.reload());
        }
    }

    function filterQueue() {
        const val = document.getElementById('queue-filter').value;
        document.querySelectorAll('.queue-card').forEach(c => {
            if(val === 'all' || c.getAttribute('data-channel') === val) c.style.display = 'flex';
            else c.style.display = 'none';
        });
    }

    function clearMemory() {
        if(confirm('WIPE ALL COMMENTS AND LOGS?')) {
            fetch('/api/system/clear-memory', { method: 'POST' })
            .then(r => r.json())
            .then(() => alert('WIPED!'));
        }
    }

    function saveInterval() {
        const val = document.getElementById('smart-interval').value;
        fetch('/api/settings/interval', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({interval: val})
        }).then(() => alert('Saved!'));
    }

    function uploadLogo() {
        const file = document.getElementById('logo-file').files[0];
        if(!file) return alert('Select file');
        const fd = new FormData();
        fd.append('file', file);
        fetch('/api/upload/logo', { method: 'POST', body: fd })
        .then(() => alert('Logo updated!'));
    }

    function selectPrompt(id) {
        fetch('/api/prompts/select', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({id: id})
        }).then(() => location.reload());
    }

    function showAddPrompt() {
        new bootstrap.Modal(document.getElementById('promptModal')).show();
    }

    function saveNewPrompt() {
        const name = document.getElementById('new-prompt-name').value;
        const prompt = document.getElementById('new-prompt-text').value;
        if(!name || !prompt) return alert('Fill all');
        fetch('/api/prompts/add', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({name: name, prompt: prompt})
        }).then(() => location.reload());
    }

    function deletePrompt(e, id) {
        e.stopPropagation();
        if(confirm('Delete theme?')) {
            fetch('/api/prompts/delete/' + id, { method: 'POST' })
            .then(() => location.reload());
        }
    }

    function saveAd() {
        fetch('/api/settings/ad', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({text: document.getElementById('ad-text').value})
        }).then(() => alert('Saved!'));
    }

    function publishNow(id) {
        if(confirm('Publish now?')) {
            fetch('/api/publish/' + id, { method: 'POST' })
            .then(r => r.ok ? location.reload() : alert('Failed'));
        }
    }

    function deletePost(id) {
        if(confirm('Delete post?')) {
            fetch('/api/delete/' + id, { method: 'POST' })
            .then(() => location.reload());
        }
    }
</script>

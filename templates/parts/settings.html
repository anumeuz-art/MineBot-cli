<div class="tab-pane fade" id="settings">
    <div class="row g-4">
        <div class="col-md-6">
            <div class="card p-4 mb-4">
                <h5 class="mb-4 fw-bold" style="color: var(--neon-g);">SMART QUEUE</h5>
                <div class="input-group mb-3">
                    <input type="number" id="smart-interval" class="form-control bg-dark text-white border-secondary" value="{{ smart_interval }}">
                    <span class="input-group-text bg-dark text-white border-secondary">HOURS</span>
                    <button class="btn btn-primary-mc px-4" onclick="saveInterval()">SAVE</button>
                </div>
                <small class="text-muted">Interval between automatic posts in Smart Queue.</small>
            </div>
            <div class="card p-4">
                <h5 class="mb-4 fw-bold" style="color: var(--neon-p);">WATERMARK</h5>
                <input type="file" id="logo-file" class="form-control bg-dark text-white border-secondary mb-3" accept=".png">
                <button class="btn btn-purple-mc w-100 py-2" onclick="uploadLogo()">UPLOAD PNG LOGO</button>
            </div>
        </div>
        <div class="col-md-6">
            <div class="card p-4 h-100">
                <h5 class="mb-4 fw-bold" style="color: var(--neon-g);">GLOBAL SIGNATURE</h5>
                <textarea id="ad-text" class="form-control bg-dark text-white border-secondary mb-4" rows="8" placeholder="Enter ad text...">{{ ad_text }}</textarea>
                <button class="btn btn-primary-mc w-100 py-3" onclick="saveAd()">SAVE SIGNATURE</button>
            </div>
        </div>
    </div>
</div>

<div class="tab-pane fade" id="prompts">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h3 class="m-0 fw-bold">AI SUBJECT THEMES</h3>
        <button class="btn btn-primary-mc btn-mc px-4" onclick="showAddPrompt()">+ NEW THEME</button>
    </div>
    <div class="row g-4" id="prompts-grid">
        {% for p in prompts %}
        <div class="col-md-4">
            <div class="card p-4 prompt-card {% if p[0]|string == active_prompt_id|string %}selected{% endif %}" onclick="selectPrompt({{ p[0] }})">
                <h4 class="fw-bold mb-3">{{ p[1] }}</h4>
                <p class="text-muted small mb-4" style="height: 60px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical;">{{ p[2] }}</p>
                <div class="d-flex justify-content-between align-items-center">
                    <span class="stat-label">ID: {{ p[0] }}</span>
                    {% if p[0] > 6 %}
                    <button class="btn btn-sm text-danger p-0" onclick="deletePrompt(event, {{ p[0] }})">DELETE</button>
                    {% endif %}
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

<div class="tab-pane fade" id="channels">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h3 class="m-0 fw-bold">MANAGED CHANNELS</h3>
        <div class="input-group" style="width: 400px;">
            <input type="text" id="new-ch-name" class="form-control bg-dark text-white border-secondary" placeholder="@channel_username">
            <button class="btn btn-primary-mc" onclick="addChannel()">ADD CHANNEL</button>
        </div>
    </div>
    <div class="row g-4">
        {% for ch in all_channels %}
        <div class="col-md-4">
            <div class="card p-4 d-flex flex-row justify-content-between align-items-center" style="border-left: 4px solid var(--neon-p);">
                <h5 class="m-0 fw-bold">{{ ch }}</h5>
                <button class="btn btn-sm btn-outline-danger border-0" onclick="removeChannel('{{ ch }}')"><i class="bi bi-x-lg"></i></button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
